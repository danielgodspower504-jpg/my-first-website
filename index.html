  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel | Cybersecurity</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(to bottom, #ffffff, #cfd9df);
}

.profile-img {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  margin-top: 60px;
  border: 6px solid #1de9b6;
  box-shadow: 0 0 25px #1de9b6;
  object-fit: cover;
}

h1 {
  color: #18e0c4;
  font-size: 36px;
  margin-top: 20px;
}

#typing {
  font-size: 20px;
  color: #00bfa5;
  margin-top: 10px;
  font-weight: bold;
}

p {
  color: #444;
  font-size: 18px;
}

.about {
  margin-top: 40px;
}

.links a {
  margin: 0 10px;
  text-decoration: none;
  color: #2196f3;
  font-weight: bold;
}

button {
  margin-top: 30px;
  padding: 15px 30px;
  border: none;
  background: #1de9b6;
  color: black;
  font-size: 18px;
  border-radius: 12px;
  cursor: pointer;
}

button:hover {
  background: #00c9a7;
}

footer {
  margin-top: 50px;
  color: #777;
}
</style>
</head>

<body>

<img src="profile.jpg" class="profile-img">

<h1>Welcome to My Website</h1>
<p id="typing"></p>

<p>This is my first real website.</p>

<div class="about">
<h2>About Me</h2>
<p>My name is Daniel and I’m learning coding and cybersecurity.</p>
</div>

<div class="links">
<a href="#">Instagram</a> |
<a href="#">Facebook</a> |
<a href="mailto:your@email.com">Email Me</a>
</div>

<button onclick="showMessage()">Click Me</button>

<footer>
<p>© 2026 Daniel</p>
</footer>

<script>
const text = "Cybersecurity Student | Future Ethical Hacker";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 50);
  }
}

typeEffect();

function showMessage() {
  alert("Thanks for visiting my website!");
}
</script>

</body>
</html>
