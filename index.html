<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel | Cybersecurity Terminal</title><style>
body{
margin:0;
background:black;
color:#00ff9c;
font-family:monospace;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

#container{
display:flex;
height:100vh;
}

#terminal{
flex:2;
padding:20px;
overflow-y:auto;
}

#panel{
flex:1;
border-left:1px solid #00ff9c;
padding:20px;
background:rgba(0,0,0,0.85);
}

h2{
margin-top:0;
}

.line{
margin:5px 0;
}

input{
background:black;
border:none;
color:#00ff9c;
font-family:monospace;
font-size:16px;
outline:none;
width:80%;
}

.status{
margin-bottom:15px;
border:1px solid #00ff9c;
padding:10px;
}

.blink{
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0}
}
</style></head><body><canvas id="matrix"></canvas>

<div id="container"><div id="terminal"><div>
██████╗  █████╗ ███╗   ██╗██╗███████╗██╗
Cybersecurity Command Console
</div><div id="scan"></div><div id="output"></div><div class="line">
Daniel@secure:~$ <input id="cmd" autofocus>
</div></div><div id="panel"><h2>System Monitor</h2><div class="status" id="visitor"></div>
<div class="status" id="security"></div>
<div class="status" id="network"></div><h2>Profile</h2>
<p>Name: Daniel</p>
<p>Role: Cybersecurity Student</p>
<p>Focus: Ethical Hacking</p></div></div><script>

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = [];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff9c";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
const text=letters.charAt(Math.floor(Math.random()*letters.length));
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,35);

/* FAKE VISITOR DETECTION */
document.getElementById("visitor").innerHTML =
"Visitor Detected<br>Status: Active";

document.getElementById("security").innerHTML =
"Firewall: Enabled<br>Threat Level: Low";

document.getElementById("network").innerHTML =
"Network: Secure<br>Monitoring: ON";

/* SCAN ANIMATION */
const scan = document.getElementById("scan");

let steps = [
"Initializing secure connection...",
"Scanning visitor device...",
"Checking security protocols...",
"System ready."
];

let i = 0;

function runScan(){
if(i < steps.length){
let line = document.createElement("div");
line.className="line";
line.textContent = steps[i];
scan.appendChild(line);
i++;
setTimeout(runScan,1200);
}
}

runScan();

/* TERMINAL */
const cmd = document.getElementById("cmd");
const output = document.getElementById("output");

const commands = {
help: "Commands: about, skills, projects, contact, whoami, clear",
about: "Daniel - Future Ethical Hacker learning cybersecurity.",
skills: "Linux | Networking | Web Security | Python (learning)",
projects: "Cybersecurity Portfolio | Security Labs | Practice Challenges",
contact: "GitHub: https://github.com/power504-jpg",
whoami: "Guest user connected to secure terminal"
};

cmd.addEventListener("keydown", function(e){
if(e.key === "Enter"){

let value = cmd.value.trim().toLowerCase();

let line = document.createElement("div");
line.textContent = "Daniel@secure:~$ " + value;
output.appendChild(line);

if(value === "clear"){
output.innerHTML="";
}
else if(commands[value]){
let res = document.createElement("div");
res.textContent = commands[value];
output.appendChild(res);
}
else{
let err = document.createElement("div");
err.textContent = "Command not recognized.";
output.appendChild(err);
}

cmd.value="";
window.scrollTo(0,document.body.scrollHeight);
}
});
</script></body>
</html>
