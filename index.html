<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel | Cybersecurity Student</title><style>
body{
margin:0;
font-family:Arial, sans-serif;
background:black;
color:white;
text-align:center;
}

/* Navigation */
nav{
background:#111;
padding:10px;
position:fixed;
top:0;
width:100%;
}

nav a{
color:#00ffd5;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

/* Header */
header{
padding:100px 20px 60px;
}

.profile{
width:150px;
height:150px;
border-radius:50%;
border:4px solid #00ffd5;
box-shadow:0 0 25px #00ffd5;
object-fit:cover;
}

/* Sections */
section{
padding:60px 20px;
}

/* Skill bars */
.skill{
max-width:400px;
margin:15px auto;
text-align:left;
}

.bar{
background:#111;
border-radius:20px;
overflow:hidden;
border:1px solid #00ffd5;
}

.progress{
height:15px;
background:#00ffd5;
width:0;
animation:load 2s forwards;
}

.html{width:70%;}
.css{width:60%;}
.cyber{width:50%;}
.python{width:40%;}

@keyframes load{
from{width:0;}
}

/* Cards */
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#111;
border:1px solid #00ffd5;
border-radius:10px;
padding:20px;
margin:10px;
width:220px;
}
</style></head><body><nav>
<a href="#about">About</a>
<a href="#skills">Skills</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav><header>
<img src="profile.jpg" class="profile">
<h1>Daniel</h1>
<p>Cybersecurity Student | Future Ethical Hacker</p>
</header><section id="about">
<h2>About Me</h2>
<p>I’m learning programming, cybersecurity, and ethical hacking.</p>
</section><section id="skills">
<h2>Skills</h2><div class="skill">
HTML
<div class="bar"><div class="progress html"></div></div>
</div><div class="skill">
CSS
<div class="bar"><div class="progress css"></div></div>
</div><div class="skill">
Cybersecurity
<div class="bar"><div class="progress cyber"></div></div>
</div><div class="skill">
Python
<div class="bar"><div class="progress python"></div></div>
</div></section><section id="projects">
<h2>GitHub Projects</h2>
<div class="cards" id="repos"></div>
</section><section id="contact">
<h2>Contact</h2>
<p>Email: your-email@example.com</p>
<p>GitHub: https://github.com/power504-jpg</p>
</section><script>
fetch("https://api.github.com/users/power504-jpg/repos")
.then(res => res.json())
.then(data => {
const container = document.getElementById("repos");
data.slice(0,6).forEach(repo=>{
const card = document.createElement("div");
card.className="card";
card.innerHTML = "<h3>"+repo.name+"</h3><p>"+(repo.description || "No description")+"</p>";
container.appendChild(card);
});
});
</script></body>
</html>
