<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My First Website</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #022f2f, #011c1c);
  color: white;
  text-align: center;
}

.container {
  margin-top: 60px;
}

img {
  width: 150px;
  border-radius: 50%;
  margin-bottom: 20px;
  border: 4px solid #00ffd5;
  box-shadow: 0 0 25px #00ffd5;
}

h1 {
  color: #00ffd5;
}

#typing {
  font-size: 18px;
  margin-top: -10px;
  margin-bottom: 20px;
  color: #c8fff6;
}

a {
  color: #00aaff;
  text-decoration: none;
  margin: 0 8px;
}

a:hover {
  text-decoration: underline;
}

button {
  background: #00ffd5;
  border: none;
  padding: 12px 25px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 8px;
  margin-top: 20px;
}

button:hover {
  background: #00c9aa;
}

footer {
  margin-top: 40px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<img src="micpo67-20260220-0001.jpg" alt="Profile">

<h1>Welcome to My Website</h1>

<p id="typing"></p>

<p>This is my first real website.</p>

<h2>About Me</h2>

<p>My name is Daniel and I'm learning coding and cybersecurity.</p>

<p>
<a href="#">Instagram</a> |
<a href="#">Facebook</a> |
<a href="mailto:youremail@example.com">Email Me</a>
</p>

<button onclick="alert('Thanks for visiting my website!')">
Click Me
</button>

<footer>
<p>© 2026 savage </p>
</footer>

</div>

<script>
const text = "Cybersecurity Student | Future Ethical Hacker";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 50);
  }
}

typeEffect();
</script>

</body>
</html>
