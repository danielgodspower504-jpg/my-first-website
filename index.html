<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access Membership</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#0f172a;
  color:white;
}

header{
  background:#020617;
  padding:20px;
  text-align:center;
}

nav{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:10px;
}

nav a{
  color:white;
  text-decoration:none;
}

.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:40px;
}

.btn{
  background:#14b8a6;
  padding:12px 25px;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

.card{
  background:#1e293b;
  padding:20px;
  margin:15px 0;
  border-radius:10px;
}

input{
  padding:10px;
  width:100%;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

footer{
  text-align:center;
  padding:20px;
  background:#020617;
  margin-top:40px;
}
</style>
</head>

<body>

<header>
<h2>Secure Access</h2>
<nav>
<a href="#">Home</a>
<a href="#membership">Membership</a>
<a href="#login">Login</a>
</nav>
</header>

<section class="hero">
<h1>Cybersecurity Membership</h1>
<p>Join our secure members-only platform</p>
<button class="btn" onclick="scrollToMembership()">Join Now</button>
</section>

<div class="container" id="membership">

<div class="card">
<h3>Basic Plan</h3>
<p>$10 / month</p>
<button class="btn">Subscribe</button>
</div>

<div class="card">
<h3>Pro Plan</h3>
<p>$25 / month</p>
<button class="btn">Subscribe</button>
</div>

<div class="card">
<h3>Elite Plan</h3>
<p>$50 / month</p>
<button class="btn">Subscribe</button>
</div>

</div>

<div class="container" id="login">
<h2>Member Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>

<p id="message"></p>

</div>

<footer>
<p>© 2026 Secure Access</p>
</footer>

<script>
function scrollToMembership(){
  document.getElementById("membership").scrollIntoView({
    behavior:"smooth"
  });
}

function login(){
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === "admin" && pass === "1234"){
    document.getElementById("message").innerText =
    "Login successful. Welcome!";
  }else{
    document.getElementById("message").innerText =
    "Invalid login details.";
  }
}
</script>

</body>
</html>
